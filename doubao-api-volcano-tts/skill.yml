name: doubao-api-volcano-tts
description: 火山引擎豆包语音合成技能，基于ByteDance Doubao语音合成API实现高质量文本转语音服务，支持多种声音类型和音频参数调节。适用于AI助手语音交互、播客生成、辅助阅读等场景。
author: keanjiang
version: 1.0.0
tool_name: doubao_tts
entry_point: scripts/doubao_tts.py

capabilities:
  - text-to-speech synthesis
  - voice type selection
  - multilingual voice support
  - audio parameter adjustment
  - Chinese and English synthesis
  - long text processing

requirements:
  - requests>=2.25.0

configuration:
  environment_variables:
    DOUBAO_APPID: "火山引擎应用ID，从控制台获取"
    DOUBAO_ACCESS_TOKEN: "API访问令牌，从控制台获取"
    DOUBAO_SECRET_KEY: "API密钥，从控制台获取"
    DOUBAO_CLUSTER: "服务集群，默认为volcano_tts"

api_info:
  service: "火山引擎 - 音频生成 > 语音合成"
  console_url: "https://console.volcengine.com/speech/service/8?AppID=7464343102"
  api_endpoint: "https://openspeech.bytedance.com/api/v1/tts"
  documentation: "https://www.volcengine.com/docs/6561/107708"

examples:
  - description: "基本语音合成"
    code: |
      from skills.doubao_tts import DoubaoTTS
      tts = DoubaoTTS()
      audio_path = tts.synthesize("你好，世界", "output.mp3")
      print(f"音频生成成功: {audio_path}")
  
  - description: "使用译制片男声（猴哥角色）"
    code: |
      tts = DoubaoTTS()
      text = "老一辈人经常说，年轻人要多多接受苦难的毒打..."
      audio_path = tts.synthesize(
          text=text,
          output_file="philosophy_speech.mp3",
          voice_type="zh_male_sunwukong_mars_bigtts"  # 猴哥声音
      )
  
  - description: "调整语音参数"
    code: |
      audio_path = tts.synthesize(
          text="文本内容",
          output_file="output.mp3",
          voice_type="zh_female_cancan_mars_bigtts",  # 灿灿女声
          speed_ratio=1.2,    # 加快语速
          volume_ratio=0.8,   # 降低音量
          encoding="mp3"      # 输出格式
      )

voice_types:
  confirmed_working:
    - zh_female_cancan_mars_bigtts  # 灿灿/Shiny (默认女声)
    - zh_male_sunwukong_mars_bigtts # 猴哥 (角色男声)
    - BV700_V2_streaming            # 流式语音700
    - BV202_streaming               # 流式语音202
  
  test_required:
    - zh_male_sokui                 # 男声苏葵
    - zh_female_sokui               # 女声苏葵
    - zh_male_dubbing               # 配音男声
    - zh_male_vintage_cinema        # 老电影男声

tested:
  - short_text_synthesis: "✅ 已通过"
  - long_text_synthesis: "✅ 已通过 (2MB文件)"
  - different_voice_types: "✅ 已通过"
  - parameter_adjustment: "✅ 已通过"
  - error_handling: "✅ 已通过"